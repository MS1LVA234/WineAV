<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>WineAV – Recuperar Password</title>
  <meta name="theme-color" content="#7B2D3E">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-logo">🍷</div>
    <h1 class="auth-title">Wine<span>AV</span></h1>
    <p class="auth-subtitle">Recuperação de password</p>

    <div class="auth-card">
      <div id="form-section">
        <p class="text-muted mb-3" style="font-size:0.9rem">Introduz o teu email e vamos enviar-te um link para recuperar a password.</p>
        <form id="forgotForm" novalidate>
          <div class="mb-3">
            <label class="form-label" for="forgot-email">Email</label>
            <input type="email" class="form-control" id="forgot-email" name="email" placeholder="o_teu@email.com" required autocomplete="email">
          </div>
          <div id="forgotError" class="alert alert-danger py-2 d-none"></div>
          <button type="submit" class="btn btn-wine w-100 py-2">Enviar link</button>
        </form>
      </div>

      <div id="success-section" class="d-none text-center py-2">
        <div style="font-size:2.5rem">📧</div>
        <h5 class="mt-3">Email enviado!</h5>
        <p class="text-muted" style="font-size:0.9rem">Se o email existir na nossa base de dados, receberás um link para recuperar a password.</p>
      </div>

      <div class="text-center mt-3">
        <a href="/index.html" class="text-muted" style="font-size:0.9rem">← Voltar ao login</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button[type=submit]');
      const errEl = document.getElementById('forgotError');
      errEl.classList.add('d-none');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> A enviar...';

      try {
        const res = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: document.getElementById('forgot-email').value.trim() })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Erro ao enviar email.');
        document.getElementById('form-section').classList.add('d-none');
        document.getElementById('success-section').classList.remove('d-none');
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('d-none');
        btn.disabled = false;
        btn.textContent = 'Enviar link';
      }
    });
  </script>
</body>
</html>
