<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>WineAV – Editar Vinho</title>
  <meta name="theme-color" content="#7B2D3E">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="WineAV">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-wine sticky-top">
    <div class="container-fluid">
      <a id="back-link" href="/dashboard.html" class="text-white text-decoration-none" style="font-size:1.2rem;">← </a>
      <span class="navbar-brand mx-auto">🍷 Wine<span>AV</span></span>
      <div class="d-flex align-items-center gap-2">
        <span class="text-white opacity-75 small" id="username-display"></span>
        <button id="logoutBtn" class="btn btn-sm btn-outline-light">Sair</button>
      </div>
    </div>
  </nav>

  <div class="page-header">
    <h4>✎ Editar Vinho</h4>
    <p id="room-name-header">–</p>
  </div>

  <div class="container-fluid px-3 pb-5">
    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
      <div class="card-body p-3">
        <form id="editWineForm" novalidate>

          <div class="mb-3">
            <label class="form-label" for="edit-wine-name">Nome do Vinho <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="edit-wine-name" name="name"
              placeholder="ex: Quinta dos Roques Encruzado" required maxlength="100">
          </div>

          <div class="row g-3 mb-3">
            <div class="col-8">
              <label class="form-label" for="edit-region">Região</label>
              <input type="text" class="form-control" id="edit-region" name="region"
                placeholder="ex: Douro, Alentejo…" maxlength="100">
            </div>
            <div class="col-4">
              <label class="form-label" for="edit-year">Ano</label>
              <input type="number" class="form-control" id="edit-year" name="year"
                placeholder="2021" min="1800" max="2099">
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label" for="edit-castas">Castas</label>
            <input type="text" class="form-control" id="edit-castas" name="castas"
              placeholder="ex: Touriga Nacional, Tinta Roriz" maxlength="200">
          </div>

          <div class="mb-3">
            <label class="form-label" for="edit-estagio">Tempo de Estágio</label>
            <input type="text" class="form-control" id="edit-estagio" name="tempo_estagio"
              placeholder="ex: 12 meses em carvalho francês" maxlength="150">
          </div>

          <div class="row g-3 mb-3">
            <div class="col-6">
              <label class="form-label" for="edit-alcool">Álcool (%)</label>
              <input type="number" class="form-control" id="edit-alcool" name="volume_alcool"
                placeholder="13.5" min="0" max="25" step="0.1">
            </div>
            <div class="col-6">
              <label class="form-label" for="edit-preco">Preço (€)</label>
              <input type="number" class="form-control" id="edit-preco" name="preco"
                placeholder="15.90" min="0" step="0.01">
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label" for="chosen_by">Escolhido Por</label>
            <select class="form-select" id="chosen_by" name="chosen_by">
              <option value="">— Nenhum —</option>
            </select>
          </div>

          <div id="form-error" class="alert alert-danger py-2 d-none"></div>

          <button type="submit" class="btn btn-wine w-100 py-3 fw-semibold fs-5 mb-3">
            💾 Guardar Alterações
          </button>

        </form>

        <!-- Delete button (only shown if user is the one who added the wine) -->
        <button id="delete-btn" class="btn btn-outline-danger w-100 py-2 d-none">
          🗑 Eliminar Vinho
        </button>
      </div>
    </div>
    <div class="bottom-spacer"></div>
  </div>

  <div id="toast-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/edit-wine.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
