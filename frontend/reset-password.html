<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>WineAV – Nova Password</title>
  <meta name="theme-color" content="#7B2D3E">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-container">
    <a href="/index.html" style="text-decoration:none;color:inherit"><div class="auth-logo">🍷</div>
    <h1 class="auth-title">Wine<span>AV</span></h1></a>
    <p class="auth-subtitle">Definir nova password</p>

    <div class="auth-card">
      <div id="form-section">
        <form id="resetForm" novalidate>
          <div class="mb-3">
            <label class="form-label" for="new-password">Nova password</label>
            <input type="password" class="form-control" id="new-password" placeholder="Mín. 6 caracteres" required minlength="6" autocomplete="new-password">
          </div>
          <div class="mb-3">
            <label class="form-label" for="confirm-password">Confirmar password</label>
            <input type="password" class="form-control" id="confirm-password" placeholder="Repete a password" required autocomplete="new-password">
          </div>
          <div id="resetError" class="alert alert-danger py-2 d-none"></div>
          <button type="submit" class="btn btn-wine w-100 py-2">Guardar password</button>
        </form>
      </div>

      <div id="invalid-section" class="d-none text-center py-2">
        <div style="font-size:2.5rem">⚠️</div>
        <h5 class="mt-3">Link inválido ou expirado</h5>
        <p class="text-muted" style="font-size:0.9rem">Pede um novo link de recuperação.</p>
        <a href="/forgot-password.html" class="btn btn-wine mt-2">Pedir novo link</a>
      </div>

      <div id="success-section" class="d-none text-center py-2">
        <div style="font-size:2.5rem">✅</div>
        <h5 class="mt-3">Password alterada!</h5>
        <p class="text-muted" style="font-size:0.9rem">Já podes entrar com a tua nova password.</p>
        <a href="/index.html" class="btn btn-wine mt-2">Entrar</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const token = new URLSearchParams(window.location.search).get('token');
    if (!token) {
      document.getElementById('form-section').classList.add('d-none');
      document.getElementById('invalid-section').classList.remove('d-none');
    }

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button[type=submit]');
      const errEl = document.getElementById('resetError');
      errEl.classList.add('d-none');

      const password = document.getElementById('new-password').value;
      const confirm = document.getElementById('confirm-password').value;

      if (password !== confirm) {
        errEl.textContent = 'As passwords não coincidem.';
        errEl.classList.remove('d-none');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> A guardar...';

      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Erro ao redefinir password.');
        document.getElementById('form-section').classList.add('d-none');
        document.getElementById('success-section').classList.remove('d-none');
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('d-none');
        btn.disabled = false;
        btn.textContent = 'Guardar password';
      }
    });
  </script>
</body>
</html>
