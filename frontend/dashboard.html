<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>WineAV – As Minhas Salas</title>
  <meta name="theme-color" content="#7B2D3E">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="WineAV">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-wine sticky-top">
    <div class="container-fluid">
      <span class="navbar-brand">🍷 Wine<span>AV</span></span>
      <div class="d-flex align-items-center gap-2">
        <a id="admin-nav-link" href="/admin.html" class="text-white text-decoration-none d-none" title="Administração">👑</a>
        <a href="/profile.html" id="avatar-nav" style="width:32px;height:32px;border-radius:50%;overflow:hidden;display:inline-block;border:2px solid rgba(255,255,255,0.5);">
          <img id="nav-avatar" src="" style="width:100%;height:100%;object-fit:cover;display:none;" alt="perfil">
        </a>
        <span class="text-white opacity-75 small" id="username-display"></span>
        <button id="logoutBtn" class="btn btn-sm btn-outline-light">Sair</button>
      </div>
    </div>
  </nav>

  <div class="page-header">
    <h4>As Minhas Salas</h4>
    <p>Seleciona uma sala ou cria/entra numa nova</p>
  </div>

  <div class="container-fluid px-3">

    <!-- Action buttons -->
    <div class="d-flex gap-2 mb-3">
      <button class="btn btn-wine flex-fill" data-bs-toggle="modal" data-bs-target="#createRoomModal">
        + Criar Sala
      </button>
      <button class="btn btn-outline-wine flex-fill" data-bs-toggle="modal" data-bs-target="#joinRoomModal">
        🔗 Entrar com Código
      </button>
    </div>

    <!-- Rooms list -->
    <div id="rooms-list"></div>
    <div class="bottom-spacer"></div>
  </div>

  <!-- Create Room Modal -->
  <div class="modal fade" id="createRoomModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header" style="background:var(--wine-primary);color:#fff;">
          <h5 class="modal-title">🍷 Nova Sala</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="createRoomForm">
            <div class="mb-3">
              <label class="form-label" for="room-name-input">Nome da Sala</label>
              <input type="text" class="form-control" id="room-name-input" name="roomName" placeholder="ex: Jantar de Vinhos 2025" required maxlength="100">
            </div>
            <div id="createRoomError" class="alert alert-danger py-2 d-none"></div>
            <div class="d-flex gap-2">
              <button type="button" class="btn btn-outline-secondary flex-fill" data-bs-dismiss="modal">Cancelar</button>
              <button type="submit" class="btn btn-wine flex-fill">Criar</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Join Room Modal -->
  <div class="modal fade" id="joinRoomModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header" style="background:var(--wine-primary);color:#fff;">
          <h5 class="modal-title">🔗 Entrar numa Sala</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="joinRoomForm">
            <div class="mb-3">
              <label class="form-label" for="invite-code-input">Código de Convite</label>
              <input type="text" class="form-control text-center fw-bold letter-spacing-wide"
                id="invite-code-input" name="inviteCode" placeholder="ex: A3F5B2C1"
                maxlength="10" required style="font-family:monospace;font-size:1.2rem;letter-spacing:3px;">
            </div>
            <div id="joinRoomError" class="alert alert-danger py-2 d-none"></div>
            <div class="d-flex gap-2">
              <button type="button" class="btn btn-outline-secondary flex-fill" data-bs-dismiss="modal">Cancelar</button>
              <button type="submit" class="btn btn-wine flex-fill">Entrar</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
