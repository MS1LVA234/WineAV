<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>WineAV – Perfil</title>
  <meta name="theme-color" content="#7B2D3E">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="WineAV">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-wine sticky-top">
    <div class="container-fluid">
      <a href="/dashboard.html" class="text-white text-decoration-none" style="font-size:1.2rem;">← </a>
      <span class="navbar-brand mx-auto">🍷 Wine<span>AV</span></span>
      <span class="text-white opacity-75 small" id="navbar-username"></span>
    </div>
  </nav>

  <div class="page-header">
    <h4>O Meu Perfil</h4>
    <p>Altera os teus dados e password</p>
  </div>

  <div class="container-fluid px-3" style="max-width:480px;">

    <!-- Nome de utilizador -->
    <div class="card wine-card mb-3">
      <div class="card-body">
        <h6 class="fw-bold mb-3" style="color:var(--wine-primary);">👤 Nome de Utilizador</h6>
        <p class="text-muted small mb-1">Nome atual</p>
        <p class="fw-bold fs-5 mb-3" id="current-username-display">—</p>
        <button class="btn btn-outline-wine w-100" id="edit-username-btn">✏️ Mudar Nome de Utilizador</button>
        <div id="username-edit-area" class="d-none mt-3">
          <div class="mb-3">
            <label class="form-label" for="profile-username">Novo nome de utilizador</label>
            <input type="text" class="form-control" id="profile-username" minlength="3" maxlength="50" autocomplete="username">
          </div>
          <div id="info-error" class="alert alert-danger py-2 d-none"></div>
          <div id="info-success" class="alert alert-success py-2 d-none">Nome atualizado com sucesso!</div>
          <div class="d-flex gap-2">
            <button class="btn btn-wine flex-fill" id="info-save-btn">Confirmar</button>
            <button class="btn btn-outline-secondary flex-fill" id="info-cancel-btn">Cancelar</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Alterar password -->
    <div class="card wine-card mb-3">
      <div class="card-body">
        <h6 class="fw-bold mb-3" style="color:var(--wine-primary);">🔒 Alterar Password</h6>
        <form id="change-password-form">
          <div class="mb-3">
            <label class="form-label" for="current-password">Password atual</label>
            <input type="password" class="form-control" id="current-password" required autocomplete="current-password">
          </div>
          <div class="mb-3">
            <label class="form-label" for="new-password">Nova password</label>
            <input type="password" class="form-control" id="new-password" required autocomplete="new-password">
          </div>
          <div class="mb-3">
            <label class="form-label" for="confirm-password">Confirmar nova password</label>
            <input type="password" class="form-control" id="confirm-password" required autocomplete="new-password">
          </div>
          <div id="pw-error" class="alert alert-danger py-2 d-none"></div>
          <div id="pw-success" class="alert alert-success py-2 d-none">Password alterada com sucesso!</div>
          <button type="submit" class="btn btn-wine w-100" id="pw-save-btn">Alterar Password</button>
        </form>
      </div>
    </div>

    <div class="bottom-spacer"></div>
  </div>

  <div id="toast-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/profile.js"></script>
</body>
</html>
