<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>WineAV – Perfil</title>
  <meta name="theme-color" content="#7B2D3E">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="WineAV">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-wine sticky-top">
    <div class="container-fluid">
      <a href="/dashboard.html" class="text-white text-decoration-none" style="font-size:1.2rem;">← </a>
      <span class="navbar-brand mx-auto">🍷 Wine<span>AV</span></span>
      <span class="text-white opacity-75 small" id="navbar-username"></span>
    </div>
  </nav>

  <div class="page-header">
    <h4>O Meu Perfil</h4>
    <p>Altera os teus dados e password</p>
  </div>

  <div class="container-fluid px-3" style="max-width:480px;">

    <!-- Info atual -->
    <div class="card wine-card mb-3">
      <div class="card-body">
        <div class="d-flex align-items-center gap-3 mb-1">
          <div style="font-size:2.5rem;">👤</div>
          <div>
            <div class="fw-bold fs-5" id="current-username-display">—</div>
            <div class="text-muted small" id="current-email-display">—</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 3 botões de ação -->
    <div class="card wine-card mb-3">
      <div class="card-body p-0">

        <!-- Mudar nome -->
        <div class="border-bottom">
          <button class="btn w-100 text-start px-3 py-3 d-flex justify-content-between align-items-center" id="btn-toggle-username" style="border:none;background:none;">
            <span>👤 Mudar nome de utilizador</span>
            <span id="arrow-username" style="font-size:.8rem;">▼</span>
          </button>
          <div id="form-username" class="d-none px-3 pb-3">
            <input type="text" class="form-control mb-2" id="input-username" placeholder="Novo nome" minlength="3" maxlength="50" autocomplete="username">
            <div id="err-username" class="alert alert-danger py-2 d-none small"></div>
            <div id="ok-username" class="alert alert-success py-2 d-none small">Nome atualizado!</div>
            <div class="d-flex gap-2">
              <button class="btn btn-wine flex-fill" id="save-username">Confirmar</button>
              <button class="btn btn-outline-secondary flex-fill" id="cancel-username">Cancelar</button>
            </div>
          </div>
        </div>

        <!-- Mudar email -->
        <div class="border-bottom">
          <button class="btn w-100 text-start px-3 py-3 d-flex justify-content-between align-items-center" id="btn-toggle-email" style="border:none;background:none;">
            <span>📧 Mudar email</span>
            <span id="arrow-email" style="font-size:.8rem;">▼</span>
          </button>
          <div id="form-email" class="d-none px-3 pb-3">
            <input type="email" class="form-control mb-2" id="input-email" placeholder="Novo email" autocomplete="email">
            <div id="err-email" class="alert alert-danger py-2 d-none small"></div>
            <div id="ok-email" class="alert alert-success py-2 d-none small">Email atualizado!</div>
            <div class="d-flex gap-2">
              <button class="btn btn-wine flex-fill" id="save-email">Confirmar</button>
              <button class="btn btn-outline-secondary flex-fill" id="cancel-email">Cancelar</button>
            </div>
          </div>
        </div>

        <!-- Mudar password -->
        <div>
          <button class="btn w-100 text-start px-3 py-3 d-flex justify-content-between align-items-center" id="btn-toggle-password" style="border:none;background:none;">
            <span>🔒 Mudar password</span>
            <span id="arrow-password" style="font-size:.8rem;">▼</span>
          </button>
          <div id="form-password" class="d-none px-3 pb-3">
            <input type="password" class="form-control mb-2" id="current-password" placeholder="Password atual" autocomplete="current-password">
            <input type="password" class="form-control mb-2" id="new-password" placeholder="Nova password" autocomplete="new-password">
            <input type="password" class="form-control mb-2" id="confirm-password" placeholder="Confirmar nova password" autocomplete="new-password">
            <div id="err-password" class="alert alert-danger py-2 d-none small"></div>
            <div id="ok-password" class="alert alert-success py-2 d-none small">Password alterada!</div>
            <div class="d-flex gap-2">
              <button class="btn btn-wine flex-fill" id="save-password">Confirmar</button>
              <button class="btn btn-outline-secondary flex-fill" id="cancel-password">Cancelar</button>
            </div>
          </div>
        </div>

      </div>
    </div>

    <div class="bottom-spacer"></div>
  </div>

  <div id="toast-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/profile.js"></script>
</body>
</html>
