<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>WineAV – Perfil</title>
  <meta name="theme-color" content="#7B2D3E">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="WineAV">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-wine sticky-top">
    <div class="container-fluid">
      <a href="/dashboard.html" class="text-white text-decoration-none" style="font-size:1.2rem;">← </a>
      <span class="navbar-brand mx-auto">🍷 Wine<span>AV</span></span>
      <div style="width:40px;"></div>
    </div>
  </nav>

  <div class="page-header">
    <h4>O Meu Perfil</h4>
    <p>Altera a tua foto e password</p>
  </div>

  <div class="container-fluid px-3" style="max-width:480px;">

    <!-- Avatar -->
    <div class="card wine-card mb-3">
      <div class="card-body text-center py-4">
        <div class="mb-3 position-relative d-inline-block">
          <img id="avatar-preview" src="" alt="Avatar"
            style="width:100px;height:100px;border-radius:50%;object-fit:cover;border:3px solid var(--wine-primary);">
          <label for="avatar-input" class="position-absolute bottom-0 end-0 btn btn-wine btn-sm rounded-circle p-1"
            style="width:32px;height:32px;line-height:1;cursor:pointer;" title="Alterar foto">
            ✏️
          </label>
        </div>
        <input type="file" id="avatar-input" accept="image/jpeg,image/png,image/webp" class="d-none">
        <div class="fw-bold fs-5" id="profile-username">–</div>
        <div class="text-muted small" id="profile-email">–</div>
        <div id="avatar-error" class="alert alert-danger py-2 mt-2 d-none"></div>
        <button id="avatar-save-btn" class="btn btn-wine mt-2 d-none px-4">Guardar foto</button>
      </div>
    </div>

    <!-- Change password -->
    <div class="card wine-card mb-3">
      <div class="card-body">
        <h6 class="fw-bold mb-3" style="color:var(--wine-primary);">🔒 Alterar Password</h6>
        <form id="change-password-form">
          <div class="mb-3">
            <label class="form-label" for="current-password">Password atual</label>
            <input type="password" class="form-control" id="current-password" required autocomplete="current-password">
          </div>
          <div class="mb-3">
            <label class="form-label" for="new-password">Nova password</label>
            <input type="password" class="form-control" id="new-password" required autocomplete="new-password">
            <div class="form-text">Mín. 8 caracteres, maiúscula, minúscula, número e carácter especial.</div>
          </div>
          <div class="mb-3">
            <label class="form-label" for="confirm-password">Confirmar nova password</label>
            <input type="password" class="form-control" id="confirm-password" required autocomplete="new-password">
          </div>
          <div id="pw-error" class="alert alert-danger py-2 d-none"></div>
          <div id="pw-success" class="alert alert-success py-2 d-none">Password alterada com sucesso!</div>
          <button type="submit" class="btn btn-wine w-100" id="pw-save-btn">Alterar Password</button>
        </form>
      </div>
    </div>

    <div class="bottom-spacer"></div>
  </div>

  <div id="toast-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/profile.js"></script>
</body>
</html>
